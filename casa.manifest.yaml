name: casa
version: 0.1.6
method: Context, Architecture, Stack & Automation
owner: Aillom

status: early-development

modes:
  - greenfield
  - brownfield
  - hybrid

principles:
  - Design for agents
  - Govern for humans
  - Evolve for legacy
  - Write once, adapt everywhere
  - Validate always
  - Load capability, not clutter

agent_native:
  standards:
    agents_md: true
    agent_skills: true
    mcp: true
    a2a: true
    openapi: true
    asyncapi: true

adapters:
  cursor: true
  codex: true
  claude: true
  devin: true
  antigravity: true
  generic: true

context:
  strategy: progressive
  max_global_context: small
  use_skills_on_demand: true
  use_subagents_for_exploration: true
  use_code_intelligence: true

stack_composition:
  registry: .casa/registry/stacks.json
  guided_cli: true
  install_requires_explicit_execute: true
  supported_surfaces:
    - web
    - mobile
    - desktop
    - api
    - admin
    - database
    - ai
  ai_providers:
    - openrouter

harness:
  recipe_registry: .casa/registry/recipes.json
  skill_marketplace: .casa/registry/skill-marketplace.json
  skill_lockfile: .casa/registry/skills.lock.json
  history: .casa/runtime/history
  recipe_runs: .casa/runtime/recipes
  terminal_first: true
  record_history: true
  execute_requires_flag: true

governance:
  require_specs: true
  require_acceptance_criteria: true
  require_security_review_for_sensitive_changes: true
  require_openapi_for_api_changes: true
  require_tests_for_behavior_changes: true
  risk_levels:
    - low
    - medium
    - high
    - critical
  protected_paths:
    - .github/workflows/**
    - .casa/kernel/policies/**
    - .casa/kernel/risk-model/**
    - .casa/registry/stacks.json
    - .casa/registry/recipes.json
    - .casa/registry/skill-marketplace.json
    - .casa/registry/skills.lock.json
    - devops/**
    - "**/migrations/**"
    - "**/auth/**"
    - "**/security/**"
    - "**/contracts/openapi/**"

legacy:
  enabled: true
  strategy:
    - discovery
    - baseline
    - seams
    - strangler
    - retire
