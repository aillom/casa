name: Feature request
description: Suggest a new C.A.S.A feature
title: "[Feature]: "
labels: ["type: feature"]
body:
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should C.A.S.A add or improve?
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why is this needed?
      description: Explain the use case.
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - greenfield
        - brownfield
        - hybrid
        - all
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
