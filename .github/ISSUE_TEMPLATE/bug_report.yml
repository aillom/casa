name: Bug report
description: Report a problem in C.A.S.A
title: "[Bug]: "
labels: ["type: bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken or unclear?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - kernel
        - context
        - capabilities
        - adapters
        - governance
        - modernization
        - docs
        - templates
        - examples
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add links, files or examples.
